name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux-release:
    name: Linux Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (Docker, Release)
        run: ./scripts/docker-build-release.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: camster-linux-release
          path: dist-release-docker/bin/

  build-linux-debug:
    name: Linux Debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (Docker, Debug)
        run: ./scripts/docker-build-debug.sh

  build-windows-cross:
    name: Windows (cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (Docker, MinGW cross)
        run: ./scripts/docker-build-windows.sh

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: camster-windows
          path: dist-windows-docker/camster-windows.zip
